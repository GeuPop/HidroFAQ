<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seguridad Social en Colombia</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background: #f0f4f8;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding-top: 40px;
    }

    .container {
      background: #fff;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 90%;
      transition: all 0.3s ease-in-out;
    }

    h1, h2 {
      text-align: center;
      color: #006064;
      margin-bottom: 20px;
    }

    label {
      font-size: 18px;
      margin-bottom: 8px;
      display: block;
    }

    input[type="number"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #00897b;
      color: white;
      font-size: 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #00695c;
    }

    .result {
      margin-top: 30px;
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    .result.visible {
      display: block;
      opacity: 1;
    }

    .result p {
      font-size: 16px;
      margin: 10px 0;
    }

    strong {
      color: #37474f;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Seguridad Social en Colombia</h1>
    <h2>Cálculo de Honorario Real</h2>

    <label for="honorarios">Ingrese aquí sus honorarios mensuales:</label>
    <input type="number" id="honorarios" placeholder="Ej: 3.000.000">

    <button onclick="calcular()">Calcular</button>

    <div class="result" id="resultado">
      <p><strong>IBC (40% del valor):</strong> <span id="ibc"></span></p>
      <p><strong>Aportes a Salud (12.5% del IBC):</strong> <span id="salud"></span></p>
      <p><strong>Pensión (16% del IBC):</strong> <span id="pension"></span></p>
      <p><strong>ARL (2.44% del IBC):</strong> <span id="arl"></span></p>
      <p><strong>Total de aportes a SS:</strong> <span id="total"></span></p>
      <p><strong>Honorario Real:</strong> <span id="honorario-real"></span></p>
    </div>
  </div>

  <script>
    function calcular() {
      const honorarios = parseFloat(document.getElementById('honorarios').value);
      const resultado = document.getElementById('resultado');

      if (isNaN(honorarios) || honorarios <= 0) {
        resultado.classList.remove('visible');
        return;
      }

      const ibc = honorarios * 0.4;
      const salud = ibc * 0.125;
      const pension = ibc * 0.16;
      const arl = ibc * 0.0244;
      const total = salud + pension + arl;
      const honorarioReal = honorarios - total;

      const formatter = new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        minimumFractionDigits: 2
      });

      document.getElementById('ibc').textContent = formatter.format(ibc);
      document.getElementById('salud').textContent = formatter.format(salud);
      document.getElementById('pension').textContent = formatter.format(pension);
      document.getElementById('arl').textContent = formatter.format(arl);
      document.getElementById('total').textContent = formatter.format(total);
      document.getElementById('honorario-real').textContent = formatter.format(honorarioReal);

      resultado.classList.add('visible');
    }
  </script>
</body>
</html>
